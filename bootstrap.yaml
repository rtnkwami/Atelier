AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap template to get all prerequisite resources in place for CI/CD

Parameters:
  GitHubRepository:
    Type: String
    Description: Repository should be of type org/repo
    Default: rtnkwami/Atelier
    
  Auth0ClientIdValue:
    Type: String
    Description: You can get this value from your Auth0 Application console
  
  Auth0ClientSecretValue:
    Type: String
    Description: The client secret from your Auth0 Application Console
  
  Auth0DomainValue:
    Type: String
    Description: Your Auth0 domain without https:// (e.g. dev-abc123.us.auth0.com)
  
  Auth0AudienceValue:
    Type: String
    Description: You can get this value from your Auth0 API console
  
  DatabaseNameValue:
    Type: String
    Default: atelier

Resources:
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  GitHubActionsOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: "https://token.actions.githubusercontent.com"
      ClientIdList:
        - "sts.amazonaws.com"

  NetworkPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: NetworkPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: NetworkDiscovery
            Effect: Allow
            Action:
              - "ec2:DescribeAccountAttributes"
              - "ec2:DescribeAddresses"
              - "ec2:DescribeAddressesAttribute"
              - "ec2:DescribeAvailabilityZones"
              - "ec2:DescribeInternetGateways"
              - "ec2:DescribeNatGateways"
              - "ec2:DescribeNetworkAcls"
              - "ec2:DescribeNetworkInterfaces"
              - "ec2:DescribeRouteTables"
              - "ec2:DescribeSecurityGroups"
              - "ec2:DescribeSubnets"
              - "ec2:DescribeVpcs"
            Resource: "*"
          
          - Sid: NetworkTagging
            Effect: Allow
            Action:
              - "ec2:CreateTags"
            Resource: "*"
          
          - Sid: EIPManagement
            Effect: Allow
            Action:
              - "ec2:AllocateAddress"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:elastic-ip/*"
          
          - Sid: IgwManagement
            Effect: Allow
            Action:
              - "ec2:AttachInternetGateway"
              - "ec2:CreateInternetGateway"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:internet-gateway/*"
          
          - Sid: NatGwManagement
            Effect: Allow
            Action:
              - "ec2:CreateNatGateway"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:natgateway/*"
          
          - Sid: EniManagement
            Effect: Allow
            Action:
              - "ec2:CreateNetworkInterface"
              - "ec2:DeleteNetworkInterface"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*"
          
          - Sid: RouteTableManagement
            Effect: Allow
            Action:
              - "ec2:AssociateRouteTable"
              - "ec2:CreateRoute"
              - "ec2:CreateRouteTable"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
          
          - Sid: SecurityGroupManagement
            Effect: Allow
            Action:
              - "ec2:AuthorizeSecurityGroupEgress"
              - "ec2:AuthorizeSecurityGroupIngress"
              - "ec2:CreateSecurityGroup"
              - "ec2:RevokeSecurityGroupEgress"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
          
          - Sid: SubnetManagement
            Effect: Allow
            Action:
              - "ec2:CreateNetworkInterface"
              - "ec2:CreateSubnet"
              - "ec2:ModifySubnetAttribute"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*"
          
          - Sid: VpcManagement
            Effect: Allow
            Action:
              - "ec2:AttachInternetGateway"
              - "ec2:CreateRouteTable"
              - "ec2:CreateSubnet"
              - "ec2:CreateVpc"
              - "ec2:DescribeVpcAttribute"
              - "ec2:GetSecurityGroupsForVpc"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"

  ComputePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: ComputePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ComputeDiscovery
            Effect: Allow
            Action:
              - "ecs:DescribeTaskDefinition"
            Resource: "*"
          
          - Sid: LogGroupDiscovery
            Effect: Allow
            Action:
              - "logs:DescribeLogGroups"
              - "logs:ListTagsForResource"
            Resource: "*"
          
          - Sid: AutoScalingManagement
            Effect: Allow
            Action:
              - "autoscaling:PutScalingPolicy"
            Resource: !Sub "arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/*"
          
          - Sid: CloudWatchAlarmManagement
            Effect: Allow
            Action:
              - "cloudwatch:DescribeAlarms"
              - "cloudwatch:PutMetricAlarm"
            Resource: !Sub "arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:*"
          
          - Sid: EcsClusterManagement
            Effect: Allow
            Action:
              - "ecs:CreateCluster"
              - "ecs:DescribeClusters"
            Resource: !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:cluster/*"
          
          - Sid: EcsServiceManagement
            Effect: Allow
            Action:
              - "ecs:CreateService"
              - "ecs:DescribeServices"
              - "ecs:UpdateService"
            Resource: !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/*/*"
          
          - Sid: EcsTaskDefinitionManagement
            Effect: Allow
            Action:
              - "ecs:RegisterTaskDefinition"
            Resource: !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*:*"
          
          - Sid: LogGroupManagement
            Effect: Allow
            Action:
              - "logs:CreateLogGroup"
              - "logs:PutRetentionPolicy"
            Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"
  
  LoadBalancerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: LoadBalancerPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: LoadBalancerDiscovery
            Effect: Allow
            Action:
              - "elasticloadbalancing:DescribeCapacityReservation"
              - "elasticloadbalancing:DescribeListenerAttributes"
              - "elasticloadbalancing:DescribeListeners"
              - "elasticloadbalancing:DescribeLoadBalancerAttributes"
              - "elasticloadbalancing:DescribeLoadBalancers"
              - "elasticloadbalancing:DescribeTags"
              - "elasticloadbalancing:DescribeTargetGroupAttributes"
              - "elasticloadbalancing:DescribeTargetGroups"
            Resource: "*"
          
          - Sid: LoadBalancerCreation
            Effect: Allow
            Action:
              - "elasticloadbalancing:CreateListener"
              - "elasticloadbalancing:CreateLoadBalancer"
            Resource: "*"
          
          - Sid: LoadBalancerManagement
            Effect: Allow
            Action:
              - "elasticloadbalancing:AddTags"
              - "elasticloadbalancing:ModifyLoadBalancerAttributes"
            Resource: !Sub "arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:loadbalancer/*"
          
          - Sid: TargetGroupManagement
            Effect: Allow
            Action:
              - "elasticloadbalancing:CreateTargetGroup"
              - "elasticloadbalancing:ModifyTargetGroupAttributes"
            Resource: !Sub "arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:targetgroup/*/*"
  
  SecurityAndIdentityPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: SecurityAndIdentityPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CertificateRequestManagement
            Effect: Allow
            Action:
              - "acm:RequestCertificate"
            Resource: "*"
          
          - Sid: CertificateManagement
            Effect: Allow
            Action:
              - "acm:DescribeCertificate"
              - "acm:ListTagsForCertificate"
            Resource: !Sub "arn:${AWS::Partition}:acm:${AWS::Region}:${AWS::AccountId}:certificate/*"
          
          - Sid: IamDiscovery
            Effect: Allow
            Action:
              - "iam:GetRole"
            Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*"
          
          - Sid: KmsManagement
            Effect: Allow
            Action:
              - "kms:CreateGrant"
              - "kms:Decrypt"
              - "kms:DescribeKey"
              - "kms:GenerateDataKey"
            Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
          
          - Sid: SecretsManagement
            Effect: Allow
            Action:
              - "secretsmanager:CreateSecret"
              - "secretsmanager:DescribeSecret"
              - "secretsmanager:GetResourcePolicy"
              - "secretsmanager:GetSecretValue"
              - "secretsmanager:TagResource"
            Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*"
          
          - Sid: SsmParameterAccess
            Effect: Allow
            Action:
              - "ssm:GetParameter"
            Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*"
  
  DnsAndStoragePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DnsAndStoragePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CallerIdentityDiscovery
            Effect: Allow
            Action:
              - "sts:GetCallerIdentity"
            Resource: "*"
          
          - Sid: S3Access
            Effect: Allow
            Action:
              - "s3:GetObject"
            Resource: "*"
          
          - Sid: HostedZoneDiscovery
            Effect: Allow
            Action:
              - "route53:ListHostedZones"
              - "route53:ListTagsForResource"
            Resource: "*"
          
          - Sid: HostedZoneManagement
            Effect: Allow
            Action:
              - "route53:ChangeResourceRecordSets"
              - "route53:GetHostedZone"
              - "route53:ListResourceRecordSets"
            Resource: "arn:aws:route53:::hostedzone/*"
          
          - Sid: Route53ChangeManagement
            Effect: Allow
            Action:
              - "route53:GetChange"
            Resource: "arn:aws:route53:::change/*"
  
  CICDRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
            - Effect: Allow
              Action: "sts:AssumeRoleWithWebIdentity"
              Principal:
                Federated: !GetAtt GitHubActionsOIDCProvider.Arn
              Condition:
                StringEquals: 
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                  "token.actions.githubusercontent.com:repository": !Sub "${GitHubRepository}"
                  "token.actions.githubusercontent.com:ref": "refs/heads/main"
                StringLike:
                  "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubRepository}:*"
      ManagedPolicyArns:
        - !Ref NetworkPolicy
        - !Ref ComputePolicy
        - !Ref LoadBalancerPolicy
        - !Ref SecurityAndIdentityPolicy
        - !Ref DnsAndStoragePolicy
        

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "atelier-ecs-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "sts:AssumeRole"
            Principal:
              Service: "ecs-tasks.amazonaws.com"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub "${DatabaseNameValue}-execution-secrets-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                Resource:
                  - !Ref Auth0Secret
                  - !Ref Auth0ClientSecret
                  - !Ref DatabasePassword
              - Effect: Allow
                Action:
                  - "ssm:GetParameters"
                  - "ssm:GetParameter"
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/atelier/*"
  
  DatabasePassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/database/password
      GenerateSecretString:
        PasswordLength: 32
        ExcludePunctuation: True

  Auth0Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/auth0/secret
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: True
        ExcludeCharacters: "ghijklmnopqrstuvwxyz"
        ExcludeUppercase: True

  Auth0ClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/auth0/client-secret
      SecretString: !Sub ${Auth0ClientSecretValue}
  
  DatabaseName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/database/name
      Value: !Sub ${DatabaseNameValue}
      Type: String
  
  Auth0Domain:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/domain
      Value: !Sub "https://${Auth0DomainValue}"
      Type: String
      
  Auth0ClientId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/client-id
      Value: !Sub ${Auth0ClientIdValue}
      Type: String
  
  Auth0Audience:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/audience
      Value: !Sub ${Auth0AudienceValue}
      Type: String
  
  DatabaseUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/database/user
      Value: atelieradmin
      Type: String

Outputs:
  TerraformStateBucketName:
    Value: !Ref TerraformStateBucket
  
  CICDRoleArn:
    Value: !GetAtt CICDRole.Arn
  
