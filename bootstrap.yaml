AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap template to get all prerequisite resources in place for CI/CD

Parameters:
  GitHubRepository:
    Type: String
    Description: Repository should be of type org/repo
    Default: rtnkwami/Atelier
    
  Auth0ClientIdValue:
    Type: String
    Description: You can get this value from your Auth0 Application console
  
  Auth0ClientSecretValue:
    Type: String
    Description: The client secret from your Auth0 Application Console
  
  Auth0DomainValue:
    Type: String
    Description: Your Auth0 domain without https:// (e.g. dev-abc123.us.auth0.com)
  
  Auth0AudienceValue:
    Type: String
    Description: You can get this value from your Auth0 API console
  
  DatabaseNameValue:
    Type: String
    Default: atelier

Resources:
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  GitHubActionsOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: "https://token.actions.githubusercontent.com"
      ClientIdList:
        - "sts.amazonaws.com"

  NetworkPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: NetworkPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: NetworkDiscovery
            Effect: Allow
            Action:
              - "ec2:Describe*"
              - "ec2:Get*"
            Resource: "*"
          
          - Sid: NetworkChanges
            Effect: Allow
            Action:
              - "ec2:*"
            Resource:
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:elastic-ip/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:internet-gateway/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:natgateway/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"
          
          - Sid: Ec2Tagging
            Effect: Allow
            Action:
              - "ec2:CreateTags"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:*/*"

  ComputePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: ComputePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ComputeDiscovery
            Effect: Allow
            Action:
              - "ecs:Describe*"
              - "ecs:List*"
              - "logs:Describe*"
              - "logs:List*"
              - "cloudwatch:Describe*"
              - "application-autoscaling:Describe*"
              - "autoscaling:Describe*"
            Resource: "*"
          
          - Sid: EcsMutations
            Effect: Allow
            Action:
              - "ecs:*"
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:cluster/*"
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/*/*"
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*:*"
          
          - Sid: LogsMutations
            Effect: Allow
            Action:
              - "logs:*"
            Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"
          
          - Sid: ApplicationAutoScalingMutations
            Effect: Allow
            Action:
              - "application-autoscaling:*"
            Resource: !Sub "arn:${AWS::Partition}:application-autoscaling:${AWS::Region}:${AWS::AccountId}:scalable-target/*"
          
          - Sid: AutoScalingMutations
            Effect: Allow
            Action:
              - "autoscaling:*"
            Resource: !Sub "arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/*"
          
          - Sid: CloudWatchAlarmMutations
            Effect: Allow
            Action:
              - "cloudwatch:*"
            Resource: !Sub "arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:*"
  
  LoadBalancerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: LoadBalancerPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: LoadBalancerDiscovery
            Effect: Allow
            Action:
              - "elasticloadbalancing:Describe*"
            Resource: "*"
          
          - Sid: LoadBalancerCreation
            Effect: Allow
            Action:
              - "elasticloadbalancing:CreateLoadBalancer"
              - "elasticloadbalancing:CreateListener"
              - "elasticloadbalancing:CreateTargetGroup"
            Resource: "*"
          
          - Sid: LoadBalancerMutations
            Effect: Allow
            Action:
              - "elasticloadbalancing:*"
            Resource:
              - !Sub "arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:loadbalancer/*"
              - !Sub "arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:targetgroup/*/*"
              - !Sub "arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:listener/*/*/*/*"

  SecurityAndIdentityPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: SecurityAndIdentityPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CertificateRequestManagement
            Effect: Allow
            Action:
              - "acm:RequestCertificate"
            Resource: "*"
          
          - Sid: CertificateManagement
            Effect: Allow
            Action:
              - "acm:DescribeCertificate"
              - "acm:ListTagsForCertificate"
              - "acm:AddTagsToCertificate"
              - "acm:DeleteCertificate"
            Resource: !Sub "arn:${AWS::Partition}:acm:${AWS::Region}:${AWS::AccountId}:certificate/*"
          
          - Sid: IamDiscovery
            Effect: Allow
            Action:
              - "iam:GetRole"
            Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*"
          
          - Sid: KmsManagement
            Effect: Allow
            Action:
              - "kms:CreateGrant"
              - "kms:Decrypt"
              - "kms:DescribeKey"
              - "kms:GenerateDataKey"
            Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
          
          - Sid: SecretsManagement
            Effect: Allow
            Action:
              - "secretsmanager:CreateSecret"
              - "secretsmanager:DescribeSecret"
              - "secretsmanager:GetResourcePolicy"
              - "secretsmanager:GetSecretValue"
              - "secretsmanager:TagResource"
            Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/atelier/*"
          
          - Sid: SsmParameterAccess
            Effect: Allow
            Action:
              - "ssm:GetParameter"
            Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/atelier/*"
  
  DnsAndStoragePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DnsAndStoragePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CallerIdentityDiscovery
            Effect: Allow
            Action:
              - "sts:GetCallerIdentity"
            Resource: "*"
          
          - Sid: TerraformStateBucketAccess
            Effect: Allow
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
              - "s3:DeleteObject"
              - "s3:ListBucket"
            Resource:
              - !Sub "${TerraformStateBucket.Arn}"
              - !Sub "${TerraformStateBucket.Arn}/*"
          
          - Sid: HostedZoneDiscovery
            Effect: Allow
            Action:
              - "route53:List*"
              - "route53:Get*"
            Resource: "*"
          
          - Sid: RecordManagement
            Effect: Allow
            Action:
              - "route53:ChangeResourceRecordSets"
            Resource: "arn:aws:route53:::hostedzone/*"
  
  DatabasePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DatabasePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DatabaseDiscovery
            Effect: Allow
            Action:
              - "rds:AddTagsToResource"
              - "rds:DescribeDBClusters"
              - "rds:DescribeDBInstances"
              - "rds:DescribeDBSubnetGroups"
              - "rds:DescribeGlobalClusters"
              - "rds:ListTagsForResource"
              - "elasticache:AddTagsToResource"
              - "elasticache:ListTagsForResource"
            Resource: "*"
          
          - Sid: RdsClusterParameterGroupAccess
            Effect: Allow
            Action:
              - "rds:CreateDBCluster"
            Resource: !Sub "arn:${AWS::Partition}:rds:${AWS::Region}:${AWS::AccountId}:cluster-pg:*"
          
          - Sid: RdsClusterManagement
            Effect: Allow
            Action:
              - "rds:CreateDBCluster"
              - "rds:CreateDBInstance"
            Resource: !Sub "arn:${AWS::Partition}:rds:${AWS::Region}:${AWS::AccountId}:cluster:*"
          
          - Sid: RdsDbInstanceManagement
            Effect: Allow
            Action:
              - "rds:CreateDBInstance"
              - "rds:CreateTenantDatabase"
            Resource: !Sub "arn:${AWS::Partition}:rds:${AWS::Region}:${AWS::AccountId}:db:*"
          
          - Sid: RdsOptionGroupAccess
            Effect: Allow
            Action:
              - "rds:CreateDBCluster"
            Resource: !Sub "arn:${AWS::Partition}:rds:${AWS::Region}:${AWS::AccountId}:og:*"
          
          - Sid: RdsSubnetGroupManagement
            Effect: Allow
            Action:
              - "rds:CreateDBCluster"
              - "rds:CreateDBSubnetGroup"
            Resource: !Sub "arn:${AWS::Partition}:rds:${AWS::Region}:${AWS::AccountId}:subgrp:*"
          
          - Sid: RdsTenantDatabaseManagement
            Effect: Allow
            Action:
              - "rds:CreateTenantDatabase"
            Resource: !Sub "arn:${AWS::Partition}:rds:${AWS::Region}:${AWS::AccountId}:tenant-database:*"
          
          - Sid: ElastiCacheClusterManagement
            Effect: Allow
            Action:
              - "elasticache:DescribeCacheClusters"
            Resource: !Sub "arn:${AWS::Partition}:elasticache:${AWS::Region}:${AWS::AccountId}:cluster:*"
          
          - Sid: ElastiCacheParameterGroupAccess
            Effect: Allow
            Action:
              - "elasticache:CreateReplicationGroup"
            Resource: !Sub "arn:${AWS::Partition}:elasticache:${AWS::Region}:${AWS::AccountId}:parametergroup:*"
          
          - Sid: ElastiCacheReplicationGroupManagement
            Effect: Allow
            Action:
              - "elasticache:DescribeReplicationGroups"
              - "elasticache:CreateReplicationGroup"
            Resource: !Sub "arn:${AWS::Partition}:elasticache:${AWS::Region}:${AWS::AccountId}:replicationgroup:*"
          
          - Sid: ElastiCacheSubnetGroupManagement
            Effect: Allow
            Action:
              - "elasticache:CreateCacheSubnetGroup"
              - "elasticache:DescribeCacheSubnetGroups"
              - "elasticache:CreateReplicationGroup"
            Resource: !Sub "arn:${AWS::Partition}:elasticache:${AWS::Region}:${AWS::AccountId}:subnetgroup:*"

  CICDRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
            - Effect: Allow
              Action: "sts:AssumeRoleWithWebIdentity"
              Principal:
                Federated: !GetAtt GitHubActionsOIDCProvider.Arn
              Condition:
                StringEquals: 
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                  "token.actions.githubusercontent.com:repository": !Sub "${GitHubRepository}"
                  "token.actions.githubusercontent.com:ref": "refs/heads/main"
                StringLike:
                  "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubRepository}:*"
      ManagedPolicyArns:
        - !Ref NetworkPolicy
        - !Ref ComputePolicy
        - !Ref LoadBalancerPolicy
        - !Ref SecurityAndIdentityPolicy
        - !Ref DnsAndStoragePolicy
        - !Ref DatabasePolicy
      Policies:
        - PolicyName: PassRoleToTaskExecRole
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "iam:PassRole"
                Resource: !Sub "${TaskExecutionRole.Arn}"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "atelier-ecs-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "sts:AssumeRole"
            Principal:
              Service: "ecs-tasks.amazonaws.com"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub "${DatabaseNameValue}-execution-secrets-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                Resource:
                  - !Ref Auth0Secret
                  - !Ref Auth0ClientSecret
                  - !Ref DatabasePassword
              - Effect: Allow
                Action:
                  - "ssm:GetParameters"
                  - "ssm:GetParameter"
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/atelier/*"
  
  DatabasePassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/database/password
      GenerateSecretString:
        PasswordLength: 32
        ExcludePunctuation: True

  Auth0Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/auth0/secret
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: True
        ExcludeCharacters: "ghijklmnopqrstuvwxyz"
        ExcludeUppercase: True

  Auth0ClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/auth0/client-secret
      SecretString: !Sub ${Auth0ClientSecretValue}
  
  DatabaseName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/database/name
      Value: !Sub ${DatabaseNameValue}
      Type: String
  
  Auth0Domain:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/domain
      Value: !Sub "https://${Auth0DomainValue}"
      Type: String
      
  Auth0ClientId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/client-id
      Value: !Sub ${Auth0ClientIdValue}
      Type: String
  
  Auth0Audience:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/audience
      Value: !Sub ${Auth0AudienceValue}
      Type: String
  
  DatabaseUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/database/user
      Value: atelieradmin
      Type: String

Outputs:
  TerraformStateBucketName:
    Value: !Ref TerraformStateBucket
  
  CICDRoleArn:
    Value: !GetAtt CICDRole.Arn
  
