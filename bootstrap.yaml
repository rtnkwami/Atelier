AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap template to get all prerequisite resources in place for CI/CD

Parameters:
  GitHubRepository:
    Type: String
    Description: Repository should be of type org/repo
    Default: rtnkwami/Atelier
    
  Auth0ClientIdValue:
    Type: String
    Description: You can get this value from your Auth0 Application console
  
  Auth0ClientSecretValue:
    Type: String
    Description: The client secret from your Auth0 Application Console
  
  Auth0DomainValue:
    Type: String
    Description: Your Auth0 domain without https:// (e.g. dev-abc123.us.auth0.com)
  
  Auth0AudienceValue:
    Type: String
    Description: You can get this value from your Auth0 API console
  
  DatabaseNameValue:
    Type: String
    Default: atelier

Resources:
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  GitHubActionsOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: "https://token.actions.githubusercontent.com"
      ClientIdList:
        - "sts.amazonaws.com"

  NetworkDiscoveryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: NetworkDiscoveryPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "ec2:DescribeAccountAttributes"
              - "ec2:DescribeAvailabilityZones"
              - "ec2:DescribeVpcs"
              - "ec2:DescribeVpcAttribute"
              - "ec2:DescribeInternetGateways"
              - "ec2:DescribeSubnets"
              - "ec2:DescribeRouteTables"
              - "ec2:DescribeNetworkAcls"
              - "ec2:DescribeAddresses"
              - "ec2:DescribeAddressesAttribute"
              - "ec2:DescribeNetworkInterfaces"
              - "ec2:DescribeNatGateways"
              - "ec2:DescribeSecurityGroups"
            Resource: "*"

  NetworkManagementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: NetworkManagementPolicy
      PolicyDocument: 
        Version: "2012-10-17"
        Statement:
          - Sid: VpcCreationAndModification
            Effect: Allow
            Action:
              - "ec2:CreateTags"
              - "ec2:CreateVpc"
              - "ec2:CreateSubnet"
              - "ec2:ModifySubnetAttribute"
              - "ec2:CreateRouteTable"
              - "ec2:CreateNetworkInterface"
              - "ec2:GetSecurityGroupsForVpc"
            Resource:
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:subnet/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"
          
          - Sid: SecurityGroupCreation
            Effect: Allow
            Action:
              - "ec2:CreateSecurityGroup"
              - "ec2:AuthorizeSecurityGroupIngress"
              - "ec2:AuthorizeSecurityGroupEgress"
              - "ec2:RevokeSecurityGroupEgress"
            Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
          
          - Sid: GatewaysAndRouting
            Effect: Allow
            Action:
              - "ec2:CreateRouteTable"
              - "ec2:CreateRoute"
              - "ec2:AssociateRouteTable"
              - "ec2:CreateInternetGateway"
              - "ec2:AttachInternetGateway"
              - "ec2:CreateNatGateway"
            Resource:
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:internet-gateway/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:natgateway/*"
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"

  SecurityConfigurationPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: SecurityAndConfigurationPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: KmsKeyPermissions
            Effect: Allow
            Action:
              - "kms:CreateGrant"
              - "kms:Decrypt"
              - "kms:DescribeKey"
              - "kms:GenerateDataKey"
            Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
          
          - Sid: SecretsAndParameterPermissions
            Effect: Allow
            Action:
              - "secretsmanager:CreateSecret"
              - "secretsmanager:DescribeSecret"
              - "secretsmanager:GetResourcePolicy"
              - "secretsmanager:GetSecretValue"
              - "secretsmanager:TagResource"
              - "ssm:GetParameter"
            Resource: 
              - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*"
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*"
          
          - Sid: RequestAcmCertificate
            Effect: Allow
            Action:
              - "acm:RequestCertificate"
            Resource: "*"
          
          - Sid: TlsCertificateManagement
            Effect: Allow
            Action:
              - "acm:DescribeCertificate"
              - "acm:ListTagsForCertificate"
            Resource: !Sub "arn:${AWS::Partition}:acm:${AWS::Region}:${AWS::AccountId}:certificate/*"

  CICDRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
            - Effect: Allow
              Action: "sts:AssumeRoleWithWebIdentity"
              Principal:
                Federated: !GetAtt GitHubActionsOIDCProvider.Arn
              Condition:
                StringEquals: 
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                  "token.actions.githubusercontent.com:repository": !Sub "${GitHubRepository}"
                  "token.actions.githubusercontent.com:ref": "refs/heads/main"
                StringLike:
                  "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubRepository}:*"
      ManagedPolicyArns:
        - !Ref NetworkDiscoveryPolicy
        - !Ref NetworkManagementPolicy
        - !Ref SecurityConfigurationPolicy
        

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "atelier-ecs-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "sts:AssumeRole"
            Principal:
              Service: "ecs-tasks.amazonaws.com"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub "${DatabaseNameValue}-execution-secrets-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                Resource:
                  - !Ref Auth0Secret
                  - !Ref Auth0ClientSecret
                  - !Ref DatabasePassword
              - Effect: Allow
                Action:
                  - "ssm:GetParameters"
                  - "ssm:GetParameter"
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/atelier/*"
  
  DatabasePassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/database/password
      GenerateSecretString:
        PasswordLength: 32
        ExcludePunctuation: True

  Auth0Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/auth0/secret
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: True
        ExcludeCharacters: "ghijklmnopqrstuvwxyz"
        ExcludeUppercase: True

  Auth0ClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /atelier/auth0/client-secret
      SecretString: !Sub ${Auth0ClientSecretValue}
  
  DatabaseName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/database/name
      Value: !Sub ${DatabaseNameValue}
      Type: String
  
  Auth0Domain:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/domain
      Value: !Sub "https://${Auth0DomainValue}"
      Type: String
      
  Auth0ClientId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/client-id
      Value: !Sub ${Auth0ClientIdValue}
      Type: String
  
  Auth0Audience:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/auth0/audience
      Value: !Sub ${Auth0AudienceValue}
      Type: String
  
  DatabaseUser:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /atelier/database/user
      Value: atelieradmin
      Type: String

Outputs:
  TerraformStateBucketName:
    Value: !Ref TerraformStateBucket
  
  CICDRoleArn:
    Value: !GetAtt CICDRole.Arn
  
